_schema-version: 3.3.0
ID: CAP-bookshop
description: A simple CAP project.
version: 1.0.0
modules:
  - name: CAP-bookshop-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: CAP-bookshop-db
      - name: CAP-sample-auth
      - name: CAP-sample-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: CAP-bookshop-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: CAP-bookshop-db
    parameters:
      buildpack: nodejs_buildpack
  - name: CAP-bookshop-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: CAP-bookshop-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - bookshopmanagebooks.zip
          name: bookshopmanagebooks
          target-path: resources/
        - artifacts:
            - manageorders.zip
          name: manageorders
          target-path: resources/
  - name: bookshopmanagebooks
    type: html5
    path: app/managebooks
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
  - name: manageorders
    type: html5
    path: app/manageorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: CAP-bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: CAP-sample-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        tenant-mode: dedicated
        xsappname: CAP-sample-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: CAP-sample-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
  - name: CAP-bookshop-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: CAP-bookshop-html5-service
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production --ws-pack
