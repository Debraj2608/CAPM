# =====================================================================================================================
# WHAT IS THIS FILE?
# This is a Multi-Target Application (MTA) descriptor file.
#
# WHY IS IT NEEDED?
# Imagine you are building a house. You don't just throw bricks together; you need a blueprint that tells the builders:
# 1. What materials are needed (Resources: Database, Security, etc.)
# 2. What rooms to build (Modules: Backend, Frontend apps)
# 3. How the rooms connect (Requires/Provides: How the frontend talks to the backend)
#
# In SAP BTP, this file is that blueprint. When you run 'npm run deploy', SAP reads this file to
# automatically set up the database, create the security settings, upload your UI files, and
# start your server in the cloud. Without this file, you would have to manually create dozens
# of services in the SAP Cockpit, which would be slow and prone to errors.
# =====================================================================================================================

_schema-version: 3.3.0
ID: CAP-sample
version: 1.0.0
description: "A simple CAP project."

# --- GLOBAL SETTINGS ---
# These settings affect the entire deployment process.
parameters:
  enable-parallel-deployments: true # Speed up deployment by installing different parts of the app at the same time.
  deploy_mode: html5-repo # Use the specialized SAP HTML5 repository to store and serve frontend files.

# --- THE "PRE-GAME" STEP ---
# Before the app is uploaded to the cloud, it must be "built" (compiled) on your computer or the build server.
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci # "Clean Install": Installs the exact versions of libraries needed so the app doesn't break.
        - npx cds build --production # Converts your CDS files into a format the production server understands.

# --- THE MODULES (The actual "Parts" of your app) ---
# Modules are the executable pieces of your application.
modules:
  # 1. THE BACKEND (The "Brain")
  # This is where your business logic, API definitions, and data processing live.
  - name: CAP-sample-srv
    type: nodejs # This tells SAP that this part is written in JavaScript/Node.js
    path: gen/srv # Where the compiled backend code is located
    parameters:
      instances: 1 # Run one copy of this server. (Increase this for high-traffic apps)
      buildpack: nodejs_buildpack # The environment setup needed to run Node.js
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # This "exports" the backend's URL so the frontend knows where to send requests.
        properties:
          srv-url: ${default-url}
    requires:
      - name: CAP-sample-auth # Needs the Security service to verify who the user is.
      - name: CAP-sample-db   # Needs the Database to save and load data.
      - name: CAP-sample-destination # Needs the Destination service to manage network paths.

  # 2. THE DATABASE INSTALLER (The "Blueprint Applier")
  # This is a temporary module that runs once to create the tables and views in your HANA database.
  - name: CAP-sample-db-deployer
    type: hdb # HANA Database type
    path: gen/db # Location of the compiled database schema
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: CAP-sample-db # Needs permission to access the actual HANA database.

  # 3. THE APP DEPLOYER (The "UI Uploader")
  # This module takes your finished UI files and pushes them into the SAP HTML5 Repository.
  - name: CAP-sample-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: CAP-sample-auth
      - name: srv-api
      - name: CAP-sample-html5-repo-host # The "Storage Room" for UI files.
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: CAPsamplecreateorders # Tells the deployer to include the "Create Orders" UI.
          artifacts:
            - bookshopcreateorders.zip
          target-path: app/
        - name: CAPsamplemanagebooksandorders # Tells the deployer to include the "Manage Books" UI.
          artifacts:
            - bookshopmanagebooksandorders.zip
          target-path: app/
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api # Creates a shortcut so the UI can find the backend without a hardcoded link.
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
              - Name: ui5 # Shortcut to the SAP UI5 library (the building blocks for the UI).
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet

  # 4. FRONTEND APP: Create Orders (Customer Portal)
  - name: CAPsamplecreateorders
    type: html5
    path: app/createorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build # Compiles the high-level UI code into simple HTML/JS/CSS.
      supported-platforms:
        []

  # 5. FRONTEND APP: Manage Books & Orders (Admin Portal)
  - name: CAPsamplemanagebooksandorders
    type: html5
    path: app/managebooksandorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  # 6. DESTINATION MANAGER (The "Connection Glue")
  # This ensures that the security and routing settings are correctly applied across the whole project.
  - name: CAP-sample-destinations
    type: com.sap.application.content
    requires:
      - name: CAP-sample-auth
        parameters:
          service-key:
            name: CAP-sample-auth-key
      - name: CAP-sample-html5-repo-host
        parameters:
          service-key:
            name: CAP-sample-html5-repo-host-key
      - name: srv-api
      - name: CAP-sample-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: CAP-sample-html5-repository # Link to where UI files are stored.
              ServiceInstanceName: CAP-sample-html5-repo-host
              ServiceKeyName: CAP-sample-html5-repo-host-key
              sap.cloud.service: CAPsample.service
            - Name: CAP-sample-auth # Link to the security system.
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: CAP-sample-auth
              ServiceKeyName: CAP-sample-auth-key
              sap.cloud.service: CAPsample.service

# --- THE RESOURCES (The "Infrastructure" or "Services") ---
# Resources are services provided by SAP BTP that your app "plugs into".
resources:
  # SECURITY (XSUAA): The "Bouncer" of your app.
  # It checks if a user is logged in and if they have the right role (e.g., 'Admin' or 'User').
  - name: CAP-sample-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json # This file defines the specific roles and permissions.
      config:
        xsappname: CAP-sample-${org}-${space}
        tenant-mode: dedicated

  # DATABASE (SAP HANA): The "Warehouse".
  # This is where your books and orders are stored permanently in tables.
  - name: CAP-sample-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # DESTINATION SERVICE: The "Phonebook".
  # Instead of using a fixed URL (which might change), the app asks the Destination service:
  # "Where is the srv-api?" and the service provides the current correct URL.
  - name: CAP-sample-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true

  # HTML5 REPO HOST: The "Hard Drive".
  # A place in the cloud where your static frontend files (HTML, CSS, JS) are safely stored.
  - name: CAP-sample-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # HTML5 RUNTIME: The "Engine".
  # The service that takes files from the Repo Host and renders them in the user's browser.
  - name: CAP-sample-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
