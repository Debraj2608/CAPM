_schema-version: 3.3.0
ID: CAP-bookshop
description: A simple CAP project.
version: 1.0.0
modules:
  - name: CAP-bookshop-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: CAP-bookshop-db
      - name: CAP-sample-auth
      - name: CAP-sample-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: CAP-bookshop-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: CAP-bookshop-db
    parameters:
      buildpack: nodejs_buildpack
  - name: CAP-bookshop-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: CAP-bookshop-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - bookshopmanagebooksandorders.zip
          name: bookshopmanagebooksandorders
          target-path: resources/
        - artifacts:
            - bookshopcreateorders.zip
          name: bookshopcreateorders
          target-path: resources/
  - name: bookshopmanagebooksandorders
    type: html5
    path: app/managebooksandorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []
  - name: bookshopcreateorders
    type: html5
    path: app/createorders
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: CAP-sample-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: CAP-sample-auth
      - name: srv-api
      - name: CAP-sample-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
      - name: CAP-bookshop-repo-host
    build-parameters:
      build-result: app/
      requires:
        - name: CAPsamplecreateorders
          artifacts:
            - createorders.zip
          target-path: app/
        - name: CAPsamplemanagebooksandorders
          artifacts:
            - managebooksandorders.zip
          target-path: app/
        - name: bookshopcreateorders
        - name: bookshopmanagebooksandorders
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
              - Name: ui5
                URL: https://ui5.sap.com
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet

  - name: CAP-sample-destinations
    type: com.sap.application.content
    requires:
      - name: CAP-sample-auth
        parameters:
          service-key:
            name: CAP-sample-auth-key
      - name: CAP-sample-html5-repo-host
        parameters:
          service-key:
            name: CAP-sample-html5-repo-host-key
      - name: srv-api
      - name: CAP-sample-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: CAP-sample-html5-repository
              ServiceInstanceName: CAP-sample-html5-repo-host
              ServiceKeyName: CAP-sample-html5-repo-host-key
              sap.cloud.service: CAPsample.service
            - Name: CAP-sample-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: CAP-sample-auth
              ServiceKeyName: CAP-sample-auth-key
              sap.cloud.service: CAPsample.service
resources:
  - name: CAP-bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: CAP-sample-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        tenant-mode: dedicated
        xsappname: CAP-sample-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: CAP-sample-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: false
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
  - name: CAP-bookshop-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: CAP-bookshop-html5-service
      service-plan: app-host
  - name: CAP-sample-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production --ws-pack
